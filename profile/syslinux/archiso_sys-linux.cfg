LABEL mulch
TEXT HELP
Boot the Mulch Linux install medium on BIOS.
It allows you to install Mulch Linux or perform system maintenance.
ENDTEXT
MENU LABEL Install Mulch Linux CLI (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

# Accessibility boot option
LABEL mulchpeech
TEXT HELP
Boot the Mulch install medium on BIOS with speakup screen reader.
It allows you to install Mulch Linux or perform system maintenance with speech feedback.
ENDTEXT
MENU LABEL Install Mulch Linux CLI (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
